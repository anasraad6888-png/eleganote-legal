<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Eleganote — Confirming payment</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f1117;
      --card: #1a1d27;
      --border: rgba(255, 255, 255, 0.08);
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --accent: #6366f1;
      --success: #22c55e;
      --error: #ef4444;
      --warn: #f59e0b;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --border: rgba(15, 23, 42, 0.1);
        --text: #0f172a;
        --muted: #64748b;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(ellipse at top, rgba(99, 102, 241, 0.12), transparent 55%), var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .shell {
      width: 100%;
      max-width: 440px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      text-align: center;
    }
    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    h1 { margin: 0 0 10px; font-size: 24px; }
    p { margin: 0 0 14px; color: var(--muted); line-height: 1.55; font-size: 14px; }
    .badge {
      display: inline-block;
      margin: 12px 0 18px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
    }
    .badge.ok { background: rgba(34, 197, 94, 0.12); color: var(--success); }
    .badge.err { background: rgba(239, 68, 68, 0.12); color: var(--error); }
    .badge.info { background: rgba(99, 102, 241, 0.12); color: var(--accent); }
    .badge.warn { background: rgba(245, 158, 11, 0.12); color: var(--warn); }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="logo">Eleganote</div>
    <h1 id="title">Confirming payment</h1>
    <div id="badge" class="badge info">Please wait…</div>
    <p id="message">We are verifying your payment with Gammal Tech.</p>
    <p id="nextStep" class="hidden">
      Close this tab, open <strong>Eleganote</strong>, then go to
      <strong>Profile → Premium → Refresh status</strong>.
    </p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session');
    const paymentToken = params.get('payment_token');
    const apiBase =
      params.get('api') || 'https://eleganote-subscription.onrender.com';

    const titleEl = document.getElementById('title');
    const badgeEl = document.getElementById('badge');
    const messageEl = document.getElementById('message');
    const nextStepEl = document.getElementById('nextStep');

    function show(state, title, badge, message, showNext) {
      titleEl.textContent = title;
      badgeEl.textContent = badge;
      badgeEl.className = 'badge ' + state;
      messageEl.textContent = message;
      nextStepEl.classList.toggle('hidden', !showNext);
    }

    async function fulfill() {
      if (!sessionId) {
        show('err', 'Missing reference', 'Error', 'This page was opened without a checkout session. Start payment from the Eleganote app.', false);
        return;
      }
      if (!paymentToken) {
        show('err', 'No payment token', 'Error', 'No payment was detected. If you cancelled, return to Eleganote and try again.', false);
        return;
      }

      try {
        const res = await fetch(apiBase + '/v1/gammal/fulfill', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, paymentToken }),
        });
        const body = await res.json().catch(() => ({}));

        if (res.ok && body.ok) {
          show(
            'ok',
            'Premium activated',
            body.alreadyFulfilled ? 'Already active' : 'Payment confirmed',
            body.alreadyFulfilled
              ? 'Your Premium subscription was already activated for this payment.'
              : 'Your Eleganote Premium subscription is now active.',
            true,
          );
          return;
        }

        const err = body.error || ('Server error (' + res.status + ')');
        show('err', 'Activation failed', 'Error', err, false);
      } catch (err) {
        show('err', 'Connection error', 'Error', err.message || 'Could not reach the subscription server.', false);
      }
    }

    fulfill();
  </script>
</body>
</html>
